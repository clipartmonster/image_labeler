{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Image Labeler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #f4f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
        }
        .auth-card {
            background: #fff;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .auth-card h1 {
            text-align: center;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 22px;
            color: #0f172a;
        }
        .auth-card p.subtitle {
            text-align: center;
            margin-bottom: 28px;
            color: #64748b;
            font-size: 14px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #fff;
            color: #1e293b;
            font-size: 15px;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-group input:focus { border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148,163,184,0.15); }
        .btn-submit {
            width: 100%;
            padding: 11px;
            background: #1e293b;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s;
        }
        .btn-submit:hover { background: #0f172a; }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
        }
        .auth-link a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .auth-link a:hover { text-decoration: underline; }
        .errors {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Register as a new labeler</p>

        {% if errors %}
        <div class="errors">
            {% for e in errors %}
            <div>{{ e }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       value="{{ username|default:'' }}">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" id="password2" name="password2" required>
            </div>
            <button type="submit" class="btn-submit">Register</button>
        </form>

        <div class="auth-link">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </div>
    </div>
</body>
</html>
