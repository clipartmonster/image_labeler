{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Image Labeler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #1a2332;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #d2e2e2;
        }
        .auth-card {
            background: #243447;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .auth-card h1 {
            text-align: center;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e8f0f0;
        }
        .auth-card p.subtitle {
            text-align: center;
            margin-bottom: 24px;
            color: #8aa8a8;
            font-size: 14px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #8aa8a8;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #3a5060;
            border-radius: 4px;
            background: #1a2332;
            color: #d2e2e2;
            font-size: 15px;
            outline: none;
        }
        .form-group input:focus { border-color: #799494; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #799494;
            color: #1a2332;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-submit:hover { background: #8ab0b0; }
        .auth-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }
        .auth-link a { color: #799494; text-decoration: none; }
        .auth-link a:hover { text-decoration: underline; }
        .errors {
            background: #3a2020;
            border: 1px solid #6a3030;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #e0a0a0;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Register as a new labeler</p>

        {% if errors %}
        <div class="errors">
            {% for e in errors %}
            <div>{{ e }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       value="{{ username|default:'' }}">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" id="password2" name="password2" required>
            </div>
            <button type="submit" class="btn-submit">Register</button>
        </form>

        <div class="auth-link">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </div>
    </div>
</body>
</html>
