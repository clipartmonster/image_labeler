{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #1a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #2a3a3a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        .card h1 {
            color: #d2e2e2;
            font-size: 22px;
            margin-bottom: 8px;
            text-align: center;
        }
        .card p.subtitle {
            color: #8a9a9a;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
        }
        .card label {
            display: block;
            color: #a0b8b8;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .card input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #4a5a5a;
            border-radius: 6px;
            background: #1a2a2a;
            color: #d2e2e2;
            font-size: 15px;
            margin-bottom: 16px;
        }
        .card input:focus {
            outline: none;
            border-color: #799494;
        }
        .card button {
            width: 100%;
            padding: 12px;
            background: #799494;
            color: #d2e2e2;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }
        .card button:hover { background: #5a7a7a; }
        .error {
            background: #3a2020;
            border: 1px solid #6a3030;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 16px;
            color: #e0a0a0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Set Your Password</h1>
        <p class="subtitle">Welcome, {{ user.username }}. Please choose a new password.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="new_password">New Password</label>
            <input type="password" name="new_password" id="new_password" required minlength="8">

            <label for="confirm_password">Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password" required minlength="8">

            <button type="submit">Set Password</button>
        </form>
    </div>
</body>
</html>
