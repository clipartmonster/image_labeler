      <link rel="stylesheet" href="{% static 'css/show_images.css' %}">
      <link rel="stylesheet" href="{% static 'css/setup_session.css' %}">
      <link rel="stylesheet" href="{% static 'css/slider.css' %}">
      <link rel="stylesheet" href="{% static 'css/view_asset_labels.css' %}">
      <link rel="stylesheet" href="{% static 'css/view_labels.css' %}">
      <link rel="stylesheet" href="{% static 'css/manage_rules.css' %}">
      <link rel="stylesheet" href="{% static 'css/view_batch_labels.css' %}">
      <link rel="stylesheet" href="{% static 'css/view_prediction_labels.css' %}">
      <link rel="stylesheet" href="{% static 'css/view_asset.css' %}">
      <link rel="stylesheet" href="{% static 'css/view_label_issues.css' %}">
      <link rel="stylesheet" href="{% static 'css/label_testing.css' %}">
      <link rel="stylesheet" href="{% static 'css/view_model_results.css' %}">
      <link rel="stylesheet" href="{% static 'css/view_primary_colors.css' %}">
      <link rel="stylesheet" href="{% static 'css/line_width_palette.css' %}">
      <link rel="stylesheet" href="{% static 'css/correct_mismatch_labels.css' %}">
      <link rel="stylesheet" href="{% static 'css/view_rough_fills.css' %}">

      <script defer type="text/javascript" src = "{% static 'js/setup_session.js'%}"></script>  
      <script defer type="text/javascript" src = "{% static 'js/view_mturk_response.js'%}"></script>
      <script defer type="text/javascript" src = "{% static 'js/show_images.js'%}"></script>   
      <script defer type="text/javascript" src = "{% static 'js/label_tools.js'%}"></script>   
      <script defer type="text/javascript" src = "{% static 'js/label_primary_colors.js'%}"></script> 
      <script defer type="text/javascript" src = "{% static 'js/flood_fill_tool.js'%}"></script>   
      <script defer type="text/javascript" src = "{% static 'js/full_fill_tool.js'%}"></script>  
      <script defer type="text/javascript" src = "{% static 'js/brush_tool.js'%}"></script>  
      <script defer type="text/javascript" src = "{% static 'js/view_asset_labels.js'%}"></script> 
      <script defer type="text/javascript" src = "{% static 'js/view_labels.js'%}"></script>   
      <script defer type="text/javascript" src = "{% static 'js/api_calls.js'%}"></script>  
      <script defer type="text/javascript" src = "{% static 'js/manage_rules.js'%}"></script>  
      <script defer type="text/javascript" src = "{% static 'js/view_prediction_labels.js'%}"></script>  
      <script defer type="text/javascript" src = "{% static 'js/view_batch_labels.js'%}"></script>

      <script defer type="text/javascript" src = "{% static 'js/view_model_results.js'%}"></script> 
      <script defer type="text/javascript" src = "{% static 'js/view_asset.js'%}"></script> 
      <script defer type="text/javascript" src = "{% static 'js/view_primary_colors.js'%}"></script> 
      <script defer type="text/javascript" src = "{% static 'js/select_line_widths.js'%}"></script> 
      <script defer type="text/javascript" src = "{% static 'js/view_rough_fills.js'%}"></script> 

      <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1691.0.min.js"></script>
      <link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.0/dist/nouislider.min.css" rel="stylesheet">
      <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.0/dist/nouislider.min.js"></script>


  </head>
 
  <body>

    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 16px; background:#1e293b;">
        <button onclick="window.location.href='/label_images/front_page/'" style="
            padding: 7px 18px;
            font-size: 13px;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            background-color: #334155;
            color: #f1f5f9;
            border: 1px solid #475569;
            border-radius: 4px;
            cursor: pointer;">
            Dashboard
        </button>

        {% if user.is_authenticated %}
        <div style="display:flex; align-items:center; gap:12px; font-family:'Roboto',sans-serif; font-size:13px; color:#cbd5e1;">
            <span>{{ user.username }}{% if user.profile.role == 'admin' %} <span style="color:#94a3b8;">(admin)</span>{% endif %}</span>
            <a href="{% url 'logout' %}" style="color:#f1f5f9; text-decoration:none; padding:4px 12px; border:1px solid #475569; border-radius:4px; font-size:12px;">Logout</a>
        </div>
        {% endif %}
    </div>

    {% block content %}
    {% endblock %}

  </body>
