{% extends 'site_header.html' %}
{% load static %}

{% block content %}
<div class="wf-page">
    <div class="wf-nav">
        <a href="/label_images/setup_session/">Session Setup</a>
        <a href="/label_images/admin/labelers/">Labelers</a>
        <a href="/label_images/admin/bulk_assign/">Bulk Assign</a>
        <a href="/label_images/admin/performance/" class="active">Performance</a>
        <a href="/label_images/rules/">Rules</a>
    </div>

    <h1>Labeler Performance</h1>

    <div class="wf-filters">
        <label>Labeler</label>
        <select id="labelerSelect" class="wf-select" onchange="loadPerf()">
            <option value="">— select —</option>
        </select>
    </div>

    <p id="perfStatus" class="wf-muted" style="margin-top:8px;"></p>

    <div id="perfContent" style="display:none;">

        <!-- Tab bar -->
        <div style="display:flex; gap:2px; margin:16px 0 12px;">
            <button class="pf-tab active" data-tab="work" onclick="switchTab('work')">Work Batches</button>
            <button class="pf-tab" data-tab="training" onclick="switchTab('training')">Training</button>
        </div>

        <!-- WORK TAB (default) -->
        <div id="tab-work" class="pf-panel">
            <div id="workStats" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px;"></div>
            <div style="margin-bottom:8px;">
                <label style="font-size:11px; color:#6f7a7a;">Filter:</label>
                <select id="workFilter" class="wf-select" style="width:auto; font-size:12px; padding:3px 8px;" onchange="renderWork()">
                    <option value="all">All</option>
                    <option value="completed">Completed</option>
                    <option value="active">Active</option>
                </select>
            </div>
            <table class="pf-tbl">
                <thead><tr>
                    <th>Feature</th>
                    <th>Batch</th>
                    <th>Labels</th>
                    <th>Hours</th>
                    <th>Speed</th>
                    <th>Deadline</th>
                    <th>Status</th>
                </tr></thead>
                <tbody id="workBody"></tbody>
            </table>
            <p id="workEmpty" class="wf-muted" style="display:none;">No work batches.</p>
        </div>

        <!-- TRAINING TAB -->
        <div id="tab-training" class="pf-panel" style="display:none;">
            <div id="trainStats" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px;"></div>
            <table class="pf-tbl">
                <thead><tr>
                    <th>Feature</th>
                    <th>Accuracy</th>
                    <th>Score</th>
                    <th>Time</th>
                    <th>Per Img</th>
                    <th>Date</th>
                </tr></thead>
                <tbody id="trainBody"></tbody>
            </table>
            <p id="trainEmpty" class="wf-muted" style="display:none;">No training results yet.</p>
        </div>
    </div>
</div>

<style>
.pf-tab {
    padding:5px 14px; font-size:12px; font-weight:600; border:1px solid #8a9c9c;
    border-radius:4px 4px 0 0; background:#c2d0d0; color:#3a4a4a; cursor:pointer;
}
.pf-tab.active { background:#a9b9b9; border-bottom-color:#a9b9b9; }
.pf-panel { background:#c8d4d4; border-radius:0 6px 6px 6px; padding:12px; }
.pf-card {
    background:#d6dfdf; border-radius:6px; padding:10px 14px; min-width:110px; flex:1;
}
.pf-card-label { font-size:10px; color:#5d6565; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
.pf-card-val { font-size:20px; font-weight:700; color:#2a3a3a; }
.pf-card-sub { font-size:11px; color:#6f7a7a; }
.pf-tbl { width:100%; border-collapse:separate; border-spacing:0 2px; }
.pf-tbl th { text-align:left; font-size:10px; font-weight:600; color:#5d6565; padding:2px 8px; white-space:nowrap; }
.pf-tbl td { font-size:12px; color:#2a3a3a; padding:5px 8px; background:#dae2e2; }
.pf-tbl tr td:first-child { border-radius:4px 0 0 4px; font-weight:600; }
.pf-tbl tr td:last-child { border-radius:0 4px 4px 0; }
.pf-tbl tr:hover td { background:#d0dcdc; }
.pf-good { color:#2a6a4a; font-weight:700; }
.pf-warn { color:#b08820; font-weight:700; }
.pf-bad  { color:#bd4444; font-weight:700; }
.pf-tag { font-size:9px; font-weight:700; padding:1px 6px; border-radius:3px; }
.pf-tag-done { background:#7aaa72; color:#fff; }
.pf-tag-active { background:#409393; color:#fff; }
.pf-tag-late { background:#bd4444; color:#fff; }
</style>

<script>
var _labelers = {{ labelers_json|safe }};
var _perfData = null;

(function() {
    var sel = document.getElementById('labelerSelect');
    _labelers.forEach(function(l) {
        var o = document.createElement('option'); o.value = l.id; o.textContent = l.username; sel.appendChild(o);
    });
})();

function switchTab(name) {
    ['work','training'].forEach(function(t) {
        document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
        document.querySelector('.pf-tab[data-tab="' + t + '"]').className = 'pf-tab' + (t === name ? ' active' : '');
    });
}

function accClass(pct) { return pct >= 85 ? 'pf-good' : pct >= 70 ? 'pf-warn' : 'pf-bad'; }

function makeCard(label, val, sub) {
    return '<div class="pf-card"><div class="pf-card-label">' + label + '</div>'
        + '<div class="pf-card-val">' + val + '</div>'
        + (sub ? '<div class="pf-card-sub">' + sub + '</div>' : '')
        + '</div>';
}

function loadPerf() {
    var uid = document.getElementById('labelerSelect').value;
    if (!uid) return;
    document.getElementById('perfStatus').textContent = 'Loading\u2026';
    document.getElementById('perfContent').style.display = 'none';

    fetch('/label_images/admin/performance/data/?user_id=' + uid)
    .then(function(r) { return r.json(); })
    .then(function(d) {
        _perfData = d;
        document.getElementById('perfStatus').textContent = '';
        document.getElementById('perfContent').style.display = '';

        var s = d.summary;

        var workHtml = makeCard('Total Labels', s.work_labels)
            + makeCard('Throughput', s.work_throughput != null ? s.work_throughput + '/hr' : '\u2014', s.work_hours + ' hrs total')
            + makeCard('On-time Rate', s.work_on_time_pct != null ? s.work_on_time_pct + '%' : '\u2014', s.work_completed + ' completed')
            + makeCard('Assignments', s.work_assignments);
        document.getElementById('workStats').innerHTML = workHtml;

        var trainAccVal = s.training_accuracy != null
            ? '<span class="' + accClass(s.training_accuracy) + '">' + s.training_accuracy + '%</span>' : '\u2014';
        var trainHtml = makeCard('Avg Accuracy', trainAccVal, s.training_total_imgs + ' total images')
            + makeCard('Sessions', s.training_sessions);
        document.getElementById('trainStats').innerHTML = trainHtml;

        renderTraining(d.training);
        renderWork();
    });
}

function renderTraining(rows) {
    var tb = document.getElementById('trainBody');
    tb.innerHTML = '';
    document.getElementById('trainEmpty').style.display = rows.length ? 'none' : '';
    rows.forEach(function(r) {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>' + (r.feature || r.task_type + '/r' + r.rule_index) + '</td>'
            + '<td><span class="' + accClass(r.accuracy_pct) + '">' + r.accuracy_pct + '%</span></td>'
            + '<td>' + r.correct + '/' + r.total + '</td>'
            + '<td>' + r.time_min + 'm</td>'
            + '<td>' + r.per_image_sec + 's</td>'
            + '<td style="font-size:11px;color:#6f7a7a;">' + r.date + '</td>';
        tb.appendChild(tr);
    });
}

function renderWork() {
    if (!_perfData) return;
    var filter = document.getElementById('workFilter').value;
    var rows = _perfData.work.filter(function(r) {
        if (filter === 'completed') return r.completed;
        if (filter === 'active') return !r.completed;
        return true;
    });
    var tb = document.getElementById('workBody');
    tb.innerHTML = '';
    document.getElementById('workEmpty').style.display = rows.length ? 'none' : '';
    rows.forEach(function(r) {
        var status = '';
        if (r.completed) {
            status = r.on_time ? '<span class="pf-tag pf-tag-done">On time</span>'
                               : '<span class="pf-tag pf-tag-late">Late</span>';
        } else {
            status = '<span class="pf-tag pf-tag-active">Active</span>';
        }
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>' + (r.feature || r.task_type + '/r' + r.rule_index) + '</td>'
            + '<td>' + r.batch_id + '/' + r.sub_batch + '</td>'
            + '<td>' + r.labels + '</td>'
            + '<td>' + r.hours + '</td>'
            + '<td>' + (r.throughput != null ? r.throughput + '/hr' : '\u2014') + '</td>'
            + '<td style="font-size:11px;">' + r.deadline + '</td>'
            + '<td>' + status + '</td>';
        tb.appendChild(tr);
    });
}
</script>
{% endblock %}
