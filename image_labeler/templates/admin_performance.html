{% extends 'site_header.html' %}
{% load static %}

{% block content %}
<div class="wf-page">
    <div class="wf-nav">
        <a href="/label_images/setup_session/">Session Setup</a>
        <a href="/label_images/admin/labelers/">Labelers</a>
        <a href="/label_images/admin/bulk_assign/">Bulk Assign</a>
        <a href="/label_images/admin/performance/" class="active">Performance</a>
        <a href="/label_images/rules/">Rules</a>
    </div>

    <h1>Labeler Performance</h1>

    <div class="wf-filters">
        <label>Labeler</label>
        <select id="labelerSelect" class="wf-select" onchange="loadPerformance()">
            <option value="">— select —</option>
        </select>
        <button class="wf-btn wf-btn-primary wf-btn-sm" onclick="loadPerformance()">Refresh</button>
    </div>

    <div id="perfContent" style="display:none;">
        <div class="wf-stats">
            <div class="wf-stat">
                <p class="label">Throughput</p>
                <p class="value" id="statThroughput">—</p>
                <p class="sub" id="statThroughputSub"></p>
            </div>
            <div class="wf-stat">
                <p class="label">Gold Accuracy</p>
                <p class="value" id="statAccuracy">—</p>
                <p class="sub" id="statAccuracySub"></p>
            </div>
            <div class="wf-stat">
                <p class="label">On-time Rate</p>
                <p class="value" id="statOntime">—</p>
                <p class="sub" id="statOntimeSub"></p>
            </div>
        </div>

        <div class="wf-stats">
            <div class="wf-stat">
                <p class="label">Total Labels</p>
                <p class="value" id="statLabels">—</p>
            </div>
            <div class="wf-stat">
                <p class="label">Total Hours</p>
                <p class="value" id="statHours">—</p>
            </div>
            <div class="wf-stat">
                <p class="label">Assignments</p>
                <p class="value" id="statAssignments">—</p>
            </div>
        </div>
    </div>

    <p id="perfStatus" class="wf-muted" style="margin-top:12px;"></p>

</div>

<script>
var _labelers = {{ labelers_json|safe }};
(function() {
    var sel = document.getElementById('labelerSelect');
    _labelers.forEach(function(l) {
        var o = document.createElement('option'); o.value = l.id; o.textContent = l.username; sel.appendChild(o);
    });
})();

function getCsrfToken() { var c = document.cookie.match(/csrftoken=([^;]+)/); return c ? c[1] : ''; }

function loadPerformance() {
    var uid = document.getElementById('labelerSelect').value;
    if (!uid) return;
    document.getElementById('perfStatus').textContent = 'Loading\u2026';
    document.getElementById('perfContent').style.display = 'none';

    fetch('/label_images/admin/performance/data/?user_id=' + uid)
    .then(function(r) { return r.json(); })
    .then(function(d) {
        document.getElementById('perfStatus').textContent = '';
        document.getElementById('perfContent').style.display = '';
        document.getElementById('statThroughput').textContent = d.throughput_labels_per_hour != null ? d.throughput_labels_per_hour + '/hr' : '\u2014';
        document.getElementById('statThroughputSub').textContent = d.total_labels + ' labels in ' + d.total_hours + ' hrs';
        document.getElementById('statAccuracy').textContent = d.accuracy_pct != null ? d.accuracy_pct + '%' : '\u2014';
        document.getElementById('statAccuracySub').textContent = d.gold_correct + ' / ' + d.gold_total + ' gold items';
        document.getElementById('statOntime').textContent = d.on_time_pct != null ? d.on_time_pct + '%' : '\u2014';
        document.getElementById('statOntimeSub').textContent = d.on_time_count + ' / ' + d.total_completed + ' completed';
        document.getElementById('statLabels').textContent = d.total_labels;
        document.getElementById('statHours').textContent = d.total_hours;
        document.getElementById('statAssignments').textContent = d.total_assignments;
    });
}

</script>
{% endblock %}
