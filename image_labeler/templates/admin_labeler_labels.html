{% extends 'site_header.html' %}
{% load static %}

{% block content %}
<div class="wf-page">
    <div class="wf-nav">
        <a href="/label_images/setup_session/">Session Setup</a>
        <a href="/label_images/admin/labelers/">Labelers</a>
        <a href="/label_images/admin/bulk_assign/">Bulk Assign</a>
        <a href="/label_images/admin/training/">Training</a>
        <a href="/label_images/admin/performance/">Performance</a>
        <a href="/label_images/admin/label_comparison/">Label Comparison</a>
        <a href="/label_images/admin/labeler_labels/" class="active">Label Review</a>
        <a href="/label_images/rules/">Rules</a>
    </div>

    <h1>Label Review</h1>

    <div class="wf-filters">
        <label>Labeler</label>
        <select id="labelerSelect" class="wf-select" onchange="loadAssignments()">
            <option value="">— select —</option>
        </select>
    </div>

    <p id="statusMsg" class="wf-muted" style="margin-top:8px;"></p>

    <div id="assignmentsWrap" style="display:none; margin-top:16px;">
        <div style="display:flex; gap:6px; margin-bottom:10px;">
            <button class="ll-tab-btn active" data-tab="work" onclick="filterTab('work',this)">Work</button>
            <button class="ll-tab-btn" data-tab="training" onclick="filterTab('training',this)">Training</button>
        </div>

        <table class="pf-tbl" id="assignTable">
            <thead><tr>
                <th>Feature</th>
                <th>Batch / Sub</th>
                <th>Assigned</th>
                <th>Status</th>
                <th></th>
            </tr></thead>
            <tbody id="assignBody"></tbody>
        </table>
        <p id="assignEmpty" class="wf-muted" style="display:none;">No assignments.</p>
    </div>

    <!-- Label detail panel -->
    <div id="detailWrap" style="display:none; margin-top:24px;">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
            <button onclick="closeDetail()" style="font-size:12px; padding:4px 12px; background:#8a9c9c; border:none; border-radius:4px; color:#fff; cursor:pointer;">← Back</button>
            <h2 id="detailTitle" style="margin:0; font-size:15px; color:#2a3a3a;"></h2>
        </div>
        <div id="detailStats" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;"></div>
        <div id="detailGrid" class="ll-grid"></div>
        <p id="detailEmpty" class="wf-muted" style="display:none;">No labels found for this assignment.</p>
    </div>
</div>

<style>
.ll-tab-btn {
    padding:5px 14px; font-size:12px; font-weight:600; border:1px solid #8a9c9c;
    border-radius:4px; background:#c2d0d0; color:#3a4a4a; cursor:pointer;
}
.ll-tab-btn.active { background:#409393; color:#fff; border-color:#409393; }

.ll-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap:8px;
}
.ll-card {
    background:#dae2e2; border-radius:6px; overflow:hidden; font-size:11px; color:#2a3a3a;
}
.ll-card img {
    width:100%; aspect-ratio:1/1; object-fit:contain; background:#f0f0f0; display:block;
}
.ll-card-body { padding:6px 8px; }
.ll-card-id { font-size:10px; color:#6f7a7a; }
.ll-answer { font-weight:700; font-size:13px; margin:2px 0; }
.ll-correct-row { font-size:11px; margin-top:2px; }
.ll-right  { color:#2a7a4a; }
.ll-wrong  { color:#bd4444; }
.ll-none   { color:#999; font-style:italic; }
.ll-correct-lbl { color:#6f7a7a; }

.ll-view-btn {
    font-size:11px; padding:3px 10px; background:#409393; color:#fff;
    border:none; border-radius:3px; cursor:pointer; white-space:nowrap;
}
.ll-view-btn:hover { background:#357e7e; }
</style>

<script>
var _labelers = {{ labelers_json|safe }};
var _assignments = [];
var _activeTab = 'work';

(function() {
    var sel = document.getElementById('labelerSelect');
    _labelers.forEach(function(l) {
        var o = document.createElement('option');
        o.value = l.id; o.textContent = l.username; sel.appendChild(o);
    });
})();

function filterTab(tab, btn) {
    _activeTab = tab;
    document.querySelectorAll('.ll-tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderAssignments();
}

function loadAssignments() {
    var uid = document.getElementById('labelerSelect').value;
    if (!uid) return;
    document.getElementById('statusMsg').textContent = 'Loading\u2026';
    document.getElementById('assignmentsWrap').style.display = 'none';
    closeDetail();

    fetch('/label_images/admin/labeler_labels/assignments/?user_id=' + uid)
    .then(function(r) { return r.json(); })
    .then(function(d) {
        _assignments = d.assignments || [];
        document.getElementById('statusMsg').textContent = '';
        document.getElementById('assignmentsWrap').style.display = '';
        renderAssignments();
    });
}

function renderAssignments() {
    var rows = _assignments.filter(function(a) {
        return _activeTab === 'training' ? a.is_training : !a.is_training;
    });
    var tb = document.getElementById('assignBody');
    tb.innerHTML = '';
    document.getElementById('assignEmpty').style.display = rows.length ? 'none' : '';
    rows.forEach(function(a) {
        var statusHtml = a.completed
            ? '<span class="pf-tag pf-tag-done">Done</span>'
            : '<span class="pf-tag pf-tag-active">Active</span>';
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>' + (a.feature || a.task_type + ' r' + a.rule_index) + '</td>'
            + '<td>' + a.batch_id + '/' + a.sub_batch + '</td>'
            + '<td style="font-size:11px;color:#6f7a7a;">' + a.assigned_at + '</td>'
            + '<td>' + statusHtml + '</td>'
            + '<td><button class="ll-view-btn" onclick="loadDetail(' + a.id + ',\''
            + (a.feature || a.task_type + ' r' + a.rule_index).replace(/'/g,"\\'")
            + '\')">View Labels</button></td>';
        tb.appendChild(tr);
    });
}

function loadDetail(assignmentId, title) {
    document.getElementById('detailTitle').textContent = title;
    document.getElementById('detailGrid').innerHTML = '';
    document.getElementById('detailStats').innerHTML = '';
    document.getElementById('detailEmpty').style.display = 'none';
    document.getElementById('assignmentsWrap').style.display = 'none';
    document.getElementById('detailWrap').style.display = '';
    document.getElementById('statusMsg').textContent = 'Loading labels\u2026';

    fetch('/label_images/admin/labeler_labels/detail/?assignment_id=' + assignmentId)
    .then(function(r) { return r.json(); })
    .then(function(d) {
        document.getElementById('statusMsg').textContent = '';
        var labels = d.labels || [];

        if (d.is_training) {
            var answered = labels.filter(function(l) { return l.answer; });
            var correct  = answered.filter(function(l) { return l.right === true; });
            var statsHtml = makeCard('Total', labels.length)
                + makeCard('Answered', answered.length)
                + makeCard('Correct', correct.length + '/' + answered.length,
                    answered.length > 0 ? Math.round(correct.length/answered.length*100) + '%' : '\u2014');
            document.getElementById('detailStats').innerHTML = statsHtml;
        } else {
            var ans = labels.filter(function(l) { return l.answer; });
            document.getElementById('detailStats').innerHTML =
                makeCard('Total', labels.length) + makeCard('Labeled', ans.length);
        }

        if (!labels.length) {
            document.getElementById('detailEmpty').style.display = '';
            return;
        }

        var grid = document.getElementById('detailGrid');
        labels.forEach(function(l) {
            var answerHtml = l.answer
                ? '<div class="ll-answer">' + l.answer + '</div>'
                : '<div class="ll-answer ll-none">—</div>';

            var extraHtml = '';
            if (d.is_training) {
                var correctDisplay = l.correct || '—';
                var rightHtml = '';
                if (l.right === true)  rightHtml = '<span class="ll-right">✓ Correct</span>';
                else if (l.right === false) rightHtml = '<span class="ll-wrong">✗ Wrong</span>';
                else rightHtml = '<span class="ll-none">No answer</span>';
                extraHtml = '<div class="ll-correct-row"><span class="ll-correct-lbl">Correct: </span>'
                    + correctDisplay + ' &nbsp;' + rightHtml + '</div>';
            }

            var card = document.createElement('div');
            card.className = 'll-card';
            card.innerHTML = '<img src="' + (l.image_link || '') + '" loading="lazy" onerror="this.style.display=\'none\'">'
                + '<div class="ll-card-body">'
                + '<div class="ll-card-id">' + l.asset_id + '</div>'
                + answerHtml
                + extraHtml
                + '</div>';
            grid.appendChild(card);
        });
    });
}

function closeDetail() {
    document.getElementById('detailWrap').style.display = 'none';
    document.getElementById('assignmentsWrap').style.display = _assignments.length ? '' : 'none';
}

function makeCard(label, val, sub) {
    return '<div class="pf-card"><div class="pf-card-label">' + label + '</div>'
        + '<div class="pf-card-val">' + val + '</div>'
        + (sub ? '<div class="pf-card-sub">' + sub + '</div>' : '')
        + '</div>';
}
</script>
{% endblock %}
