{% extends 'site_header.html' %}
{% load static %}

{% block content %}
<div class="wf-page">
    <div class="wf-nav">
        <a href="/label_images/setup_session/">Session Setup</a>
        <a href="/label_images/admin/labelers/">Labelers</a>
        <a href="/label_images/admin/bulk_assign/">Bulk Assign</a>
        <a href="/label_images/admin/training/">Training</a>
        <a href="/label_images/admin/performance/">Performance</a>
        <a href="/label_images/admin/label_comparison/" class="active">Label Comparison</a>
        <a href="/label_images/rules/">Rules</a>
    </div>

    <h1>Label Comparison</h1>

    <div class="wf-card" style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
        <div>
            <label style="display:block; font-size:.8rem; color:#3a4a4a; margin-bottom:4px; font-weight:600;">Feature</label>
            <select id="featureSelect" class="wf-select" style="width:220px;" onchange="onFeatureChange()">
                <option value="">— select —</option>
            </select>
        </div>
        <div>
            <label style="display:block; font-size:.8rem; color:#3a4a4a; margin-bottom:4px; font-weight:600;">Batch / Sub-batch</label>
            <select id="batchSelect" class="wf-select" style="width:180px;">
                <option value="">— select feature first —</option>
            </select>
        </div>
        <button class="wf-btn wf-btn-primary" onclick="loadComparison()" style="height:36px;">Load</button>
    </div>

    <p id="lcStatus" class="wf-muted" style="margin-top:8px; min-height:1.4em;"></p>

    <div id="lcContent" style="display:none; margin-top:16px;">
        <div id="lcStats" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px;"></div>

        <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:12px;">
            <div>
                <label style="font-size:11px; color:#6f7a7a;">Show:</label>
                <select id="lcFilter" class="wf-select" style="width:auto; font-size:12px; padding:3px 8px;" onchange="renderGrid()">
                    <option value="all">All</option>
                    <option value="disagreement">Disagreements only</option>
                    <option value="agreement">Agreements only</option>
                    <option value="corrected">Corrected</option>
                    <option value="flagged">Flagged</option>
                    <option value="unlabeled">Missing labels</option>
                </select>
            </div>
            <div>
                <label style="font-size:11px; color:#6f7a7a;">Labeler:</label>
                <select id="lcLabelerFilter" class="wf-select" style="width:auto; font-size:12px; padding:3px 8px;" onchange="renderGrid()">
                    <option value="all">All labelers</option>
                </select>
            </div>
            <div>
                <label style="font-size:11px; color:#6f7a7a;">Disagreement between:</label>
                <select id="lcPairA" class="wf-select" style="width:auto; font-size:12px; padding:3px 8px;" onchange="renderGrid()">
                    <option value="">—</option>
                </select>
                <span style="font-size:11px; color:#6f7a7a;"> &amp; </span>
                <select id="lcPairB" class="wf-select" style="width:auto; font-size:12px; padding:3px 8px;" onchange="renderGrid()">
                    <option value="">—</option>
                </select>
            </div>
        </div>

        <div id="lcTableWrap" style="overflow-x:auto;"></div>
        <p id="lcEmpty" class="wf-muted" style="display:none;">No assets match the filter.</p>
    </div>
</div>

<!-- Image lightbox with info card + zoom -->
<div id="lcLightbox" onclick="if(event.target===this)closeLcLightbox();">
    <button id="lcLbPrev" onclick="stepLcLightbox(-1)">&#8249;</button>
    <div id="lcLbCenter">
        <div id="lcLbZoomWrap">
            <img id="lcLightboxImg">
            <div id="lcLbLens"></div>
        </div>
        <div id="lcLbCard"></div>
        <div id="lcLbCounter"></div>
    </div>
    <button id="lcLbNext" onclick="stepLcLightbox(1)">&#8250;</button>
</div>

<style>
.lc-tbl { width:100%; border-collapse:separate; border-spacing:0 2px; }
.lc-tbl th { text-align:left; font-size:10px; font-weight:600; color:#5d6565; padding:4px 6px; white-space:nowrap; position:sticky; top:0; background:#bdc7c7; }
.lc-tbl td { font-size:12px; color:#2a3a3a; padding:4px 6px; background:#dae2e2; vertical-align:middle; }
.lc-tbl tr:hover td { background:#d0dcdc; }
.lc-tbl tr td:first-child { border-radius:4px 0 0 4px; }
.lc-tbl tr td:last-child { border-radius:0 4px 4px 0; }
.lc-yes { color:#2a6a4a; font-weight:700; }
.lc-no { color:#bd4444; font-weight:700; }
.lc-none { color:#999; font-style:italic; }
.lc-flag { background:#fff3cd !important; }
.lc-disagree td { border-top:2px solid #e8a040; }
.lc-thumb { width:40px; height:40px; object-fit:contain; background:#f0f0f0; border-radius:3px; cursor:pointer; }
.lc-card { display:flex; gap:10px; flex-wrap:wrap; }
.lc-stat { background:#d6dfdf; border-radius:6px; padding:10px 14px; min-width:100px; }
.lc-stat-label { font-size:10px; color:#5d6565; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
.lc-stat-val { font-size:20px; font-weight:700; color:#2a3a3a; }
.lc-stat-sub { font-size:11px; color:#6f7a7a; }

/* Lightbox */
#lcLightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.80); z-index:9999; align-items:center; justify-content:center; }
#lcLbCenter { display:flex; flex-direction:column; align-items:center; gap:14px; max-width:90vw; }
#lcLbZoomWrap { position:relative; overflow:hidden; border-radius:6px; cursor:crosshair; background:#111; }
#lcLightboxImg { max-width:80vw; max-height:55vh; object-fit:contain; display:block; transition:none; }
#lcLbLens { display:none; position:absolute; pointer-events:none; width:200px; height:200px; border:2px solid rgba(255,255,255,0.6); border-radius:50%; background-repeat:no-repeat; box-shadow:0 0 0 9999px rgba(0,0,0,0.35); }
#lcLbCard { background:#1e2a2a; border-radius:10px; padding:16px 22px; color:#d6dfdf; min-width:340px; max-width:80vw; box-shadow:0 4px 16px rgba(0,0,0,0.4); }
#lcLbCard table { width:100%; border-collapse:collapse; }
#lcLbCard td { padding:5px 10px; font-size:16px; }
#lcLbCard .lb-labeler { color:#8fb8b8; font-weight:600; }
#lcLbCard .lb-yes { color:#5be08a; font-weight:700; }
#lcLbCard .lb-no { color:#f07070; font-weight:700; }
#lcLbCard .lb-none { color:#666; font-style:italic; }
#lcLbCard .lb-asset-id { font-size:14px; color:#a0b0b0; margin-bottom:6px; font-weight:600; }
#lcLbOverride { margin-top:10px; padding-top:10px; border-top:1px solid #2e3e3e; }
#lcLbOverride .lb-ov-label { font-size:13px; color:#7a8a8a; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
#lcLbOverride .lb-ov-current { font-size:16px; font-weight:700; margin-bottom:8px; }
.lb-ov-btn { border:none; padding:6px 18px; border-radius:5px; font-size:14px; font-weight:700; cursor:pointer; margin-right:6px; transition:opacity .15s; }
.lb-ov-btn:hover { opacity:.85; }
.lb-ov-yes { background:#2a6a4a; color:#fff; }
.lb-ov-no { background:#bd4444; color:#fff; }
#lcLbCounter { font-size:14px; color:#8a9a9a; }
#lcLbPrev, #lcLbNext { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.12); border:none; color:#fff; font-size:40px; width:48px; height:80px; border-radius:6px; cursor:pointer; z-index:10; transition:background 0.15s; }
#lcLbPrev:hover, #lcLbNext:hover { background:rgba(255,255,255,0.25); }
#lcLbPrev { left:16px; }
#lcLbNext { right:16px; }
</style>

<script>
var _features = {{ features_json|safe }};
var _subBatches = {{ sub_batches_json|safe }};
var _lcData = null;

(function() {
    var seen = {};
    var sel = document.getElementById('featureSelect');
    _features.forEach(function(f) {
        var key = f.task_type + '|' + f.rule_index;
        if (seen[key]) return;
        seen[key] = true;
        var o = document.createElement('option');
        o.value = key;
        o.textContent = f.title + ' (' + f.task_type + ', ' + f.rule_index + ')';
        sel.appendChild(o);
    });
})();

function onFeatureChange() {
    var sel = document.getElementById('batchSelect');
    sel.innerHTML = '<option value="">— select —</option>';
    var v = document.getElementById('featureSelect').value;
    if (!v) return;
    var parts = v.split('|');
    var tt = parts[0], ri = parseInt(parts[1]);
    _subBatches.filter(function(sb) {
        return sb.task_type === tt && sb.rule_index === ri;
    }).forEach(function(sb) {
        var o = document.createElement('option');
        o.value = sb.batch_id + '|' + sb.large_sub_batch;
        o.textContent = 'Batch ' + sb.batch_id + ' / Sub ' + sb.large_sub_batch;
        sel.appendChild(o);
    });
}

function loadComparison() {
    var fv = document.getElementById('featureSelect').value;
    var bv = document.getElementById('batchSelect').value;
    if (!fv || !bv) { alert('Select a feature and batch.'); return; }

    var fp = fv.split('|'), bp = bv.split('|');
    var url = '/label_images/admin/label_comparison/data/?task_type=' + fp[0]
        + '&rule_index=' + fp[1] + '&batch_id=' + bp[0] + '&large_sub_batch=' + bp[1];

    document.getElementById('lcStatus').textContent = 'Loading\u2026';
    document.getElementById('lcContent').style.display = 'none';

    fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
        _lcData = d;
        document.getElementById('lcStatus').textContent = '';
        document.getElementById('lcContent').style.display = '';

        var labelers = d.labelers || [];
        var lSel = document.getElementById('lcLabelerFilter');
        lSel.innerHTML = '<option value="all">All labelers</option>';
        var pairA = document.getElementById('lcPairA');
        var pairB = document.getElementById('lcPairB');
        pairA.innerHTML = '<option value="">\u2014</option>';
        pairB.innerHTML = '<option value="">\u2014</option>';
        labelers.forEach(function(l) {
            var o = document.createElement('option');
            o.value = l; o.textContent = l;
            lSel.appendChild(o);
            pairA.appendChild(o.cloneNode(true));
            pairB.appendChild(o.cloneNode(true));
        });

        var total = d.total || 0;
        var disagreements = (d.assets || []).filter(function(a) { return a.disagreement; }).length;
        var flagged = (d.assets || []).filter(function(a) { return a.flagged; }).length;
        var fullyLabeled = (d.assets || []).filter(function(a) { return a.num_labeled === labelers.length && labelers.length > 0; }).length;

        document.getElementById('lcStats').innerHTML =
            makeStat('Total Assets', total)
            + makeStat('Labelers', labelers.length)
            + makeStat('Disagreements', disagreements, Math.round(disagreements / total * 100) + '%')
            + makeStat('Flagged', flagged)
            + makeStat('Fully Labeled', fullyLabeled, Math.round(fullyLabeled / total * 100) + '%');

        renderGrid();
    });
}

function makeStat(label, val, sub) {
    return '<div class="lc-stat"><div class="lc-stat-label">' + label + '</div>'
        + '<div class="lc-stat-val">' + val + '</div>'
        + (sub ? '<div class="lc-stat-sub">' + sub + '</div>' : '') + '</div>';
}

var _lbFiltered = [];   // current filtered asset list (kept in sync by renderGrid)
var _lbIdx = 0;         // current lightbox index

function openLcLightbox(idx) {
    _lbIdx = idx;
    var lb = document.getElementById('lcLightbox');
    lb.style.display = 'flex';
    showLbAsset();
}

function closeLcLightbox() {
    document.getElementById('lcLightbox').style.display = 'none';
}

function stepLcLightbox(dir) {
    if (!_lbFiltered.length) return;
    _lbIdx = (_lbIdx + dir + _lbFiltered.length) % _lbFiltered.length;
    showLbAsset();
}

function showLbAsset() {
    var a = _lbFiltered[_lbIdx];
    if (!a) return;
    var img = document.getElementById('lcLightboxImg');
    img.src = a.image_link || '';

    var labelers = (_lcData && _lcData.labelers) || [];
    var corr = a.corrections || {};
    var rows = labelers.map(function(l) {
        var val = a.labels[l];
        var cls = !val ? 'lb-none' : val === 'yes' ? 'lb-yes' : 'lb-no';
        var txt = val || '\u2014';
        var wrongMark = '';
        if (corr[l]) {
            wrongMark = ' <span style="color:#f07070; font-size:14px; font-weight:700;">\u2716 wrong</span>';
        }
        return '<tr><td class="lb-labeler">' + l + '</td><td class="' + cls + '">' + txt + wrongMark + '</td></tr>';
    }).join('');

    var statusHtml = '';
    if (a.corrected) {
        var caVal = a.correct_answer || '';
        var caCls = caVal === 'yes' ? 'lb-yes' : 'lb-no';
        statusHtml += '<span style="color:#6ab4f5; font-weight:700; margin-right:6px;">Corrected \u2192 <span class="' + caCls + '">' + caVal + '</span></span>';
    } else if (a.disagreement) {
        statusHtml += '<span style="color:#e8a040; font-weight:700; margin-right:6px;">Disagree</span>';
    }
    if (a.flagged) statusHtml += '<span style="color:#f07070;">Flagged</span>';
    if (!a.corrected && !a.disagreement && !a.flagged && a.num_labeled > 0) statusHtml += '<span style="color:#5be08a;">OK</span>';

    var correctHtml = '<div id="lcLbOverride">'
        + '<div class="lb-ov-label">Set Correct Answer</div>'
        + '<button class="lb-ov-btn lb-ov-yes" onclick="setComparisonOverride(\'yes\')">Yes</button>'
        + '<button class="lb-ov-btn lb-ov-no" onclick="setComparisonOverride(\'no\')">No</button>'
        + '</div>';

    document.getElementById('lcLbCard').innerHTML =
        '<div class="lb-asset-id">Asset: ' + a.asset_id + (statusHtml ? ' &nbsp; ' + statusHtml : '') + '</div>'
        + '<table>' + rows + '</table>'
        + correctHtml;

    document.getElementById('lcLbCounter').textContent = (_lbIdx + 1) + ' / ' + _lbFiltered.length;

    document.getElementById('lcLbLens').style.display = 'none';
}

function setComparisonOverride(answer) {
    var a = _lbFiltered[_lbIdx];
    if (!a || !_lcData) return;

    fetch('/label_images/admin/label_comparison/override/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
        body: JSON.stringify({
            task_type: _lcData.task_type,
            rule_index: _lcData.rule_index,
            asset_id: a.asset_id,
            answer: answer
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.status === 'ok') {
            var newCorrections = {};
            (d.corrected || []).forEach(function(lid) {
                newCorrections[lid] = { original: a.labels[lid], correct: answer };
            });
            a.corrections = newCorrections;
            a.corrected = true;
            a.correct_answer = answer;
            showLbAsset();
            renderGrid();
        }
    });
}

// Zoom lens on hover
(function() {
    var wrap = document.getElementById('lcLbZoomWrap');
    var img = document.getElementById('lcLightboxImg');
    var lens = document.getElementById('lcLbLens');
    var ZOOM = 2.5;

    wrap.addEventListener('mousemove', function(e) {
        if (!img.naturalWidth) return;
        lens.style.display = 'block';
        var rect = img.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var lw = lens.offsetWidth / 2, lh = lens.offsetHeight / 2;
        lens.style.left = (x - lw) + 'px';
        lens.style.top = (y - lh) + 'px';
        var bgW = img.naturalWidth * ZOOM;
        var bgH = img.naturalHeight * ZOOM;
        var scaleX = bgW / rect.width;
        var scaleY = bgH / rect.height;
        lens.style.backgroundImage = 'url(' + img.src + ')';
        lens.style.backgroundSize = bgW + 'px ' + bgH + 'px';
        lens.style.backgroundPosition = (-x * scaleX + lw) + 'px ' + (-y * scaleY + lh) + 'px';
    });
    wrap.addEventListener('mouseleave', function() { lens.style.display = 'none'; });
})();

// Arrow key navigation + Escape
document.addEventListener('keydown', function(e) {
    if (document.getElementById('lcLightbox').style.display !== 'flex') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); stepLcLightbox(1); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); stepLcLightbox(-1); }
    else if (e.key === 'Escape') { closeLcLightbox(); }
});

function renderGrid() {
    if (!_lcData) return;
    var filter = document.getElementById('lcFilter').value;
    var labelerFilter = document.getElementById('lcLabelerFilter').value;
    var pairA = document.getElementById('lcPairA').value;
    var pairB = document.getElementById('lcPairB').value;
    var labelers = _lcData.labelers || [];
    var assets = (_lcData.assets || []).filter(function(a) {
        if (filter === 'disagreement') return a.disagreement;
        if (filter === 'agreement') return !a.disagreement && a.num_labeled > 0;
        if (filter === 'corrected') return a.corrected;
        if (filter === 'flagged') return a.flagged;
        if (filter === 'unlabeled') return a.num_labeled < labelers.length;
        return true;
    });

    if (labelerFilter !== 'all') {
        assets = assets.filter(function(a) {
            return a.labels[labelerFilter] != null;
        });
    }

    // Pair disagreement filter
    if (pairA && pairB && pairA !== pairB) {
        assets = assets.filter(function(a) {
            var va = a.labels[pairA], vb = a.labels[pairB];
            return va && vb && va !== vb;
        });
    }

    var wrap = document.getElementById('lcTableWrap');
    document.getElementById('lcEmpty').style.display = assets.length ? 'none' : '';

    _lbFiltered = assets;

    if (!assets.length) { wrap.innerHTML = ''; return; }

    var headerCols = labelers.map(function(l) {
        var highlight = '';
        if ((labelerFilter !== 'all' && l === labelerFilter) || l === pairA || l === pairB) highlight = ' style="background:#c0dada;"';
        return '<th' + highlight + '>' + l + '</th>';
    }).join('');

    var html = '<table class="lc-tbl"><thead><tr><th>Image</th><th>Asset ID</th>'
        + headerCols + '<th>Status</th></tr></thead><tbody>';

    assets.forEach(function(a, idx) {
        var rowClass = a.disagreement ? ' class="lc-disagree"' : '';
        var flagClass = a.flagged ? ' lc-flag' : '';
        var pairDisagree = pairA && pairB && pairA !== pairB && a.labels[pairA] && a.labels[pairB] && a.labels[pairA] !== a.labels[pairB];

        var cells = labelers.map(function(l) {
            var val = a.labels[l];
            var extra = '';
            if (pairDisagree && (l === pairA || l === pairB)) extra = ' background:#fde8c8;';
            if (!val) return '<td class="lc-none' + flagClass + '"' + (extra ? ' style="' + extra + '"' : '') + '>\u2014</td>';
            var cls = val === 'yes' ? 'lc-yes' : val === 'no' ? 'lc-no' : '';
            return '<td class="' + cls + flagClass + '"' + (extra ? ' style="' + extra + '"' : '') + '>' + val + '</td>';
        }).join('');

        var statusParts = [];
        if (a.disagreement) statusParts.push('<span style="color:#e8a040; font-weight:700;">Disagree</span>');
        if (a.flagged) statusParts.push('<span style="color:#bd4444; font-size:11px;">Flagged</span>');
        if (a.num_labeled === 0) statusParts.push('<span style="color:#999; font-size:11px;">No labels</span>');
        if (!statusParts.length) statusParts.push('<span style="color:#2a6a4a; font-size:11px;">OK</span>');

        if (a.corrected) {
            var ca = a.correct_answer || '';
            var caCls = ca === 'yes' ? 'lc-yes' : 'lc-no';
            statusParts.unshift('<span style="color:#6ab4f5; font-weight:700;">Corrected \u2192 </span><span class="' + caCls + '" style="font-weight:800;">' + ca + '</span>');
        }

        html += '<tr' + rowClass + '>'
            + '<td' + (flagClass ? ' class="' + flagClass.trim() + '"' : '') + '><img class="lc-thumb" src="' + (a.image_link || '') + '" loading="lazy" onerror="this.style.display=\'none\'" onclick="openLcLightbox(' + idx + ')"></td>'
            + '<td' + (flagClass ? ' class="' + flagClass.trim() + '"' : '') + '>' + a.asset_id + '</td>'
            + cells
            + '<td' + (flagClass ? ' class="' + flagClass.trim() + '"' : '') + '>' + statusParts.join(' ') + '</td>'
            + '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
}
</script>
{% endblock %}
